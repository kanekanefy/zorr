name: QA Smoke

# Runs after the Build and Push workflow finishes (i.e. after Dokploy has
# been told to redeploy). Sleeps long enough for the new container to roll,
# then hits the production URL with the qa/test.mjs Playwright runner.
#
# On failure, opens a GitHub issue assigned to the repo owner. That's the
# "auto-ping" — you'll get a GitHub notification next time you check.
#
# Manual run: Actions tab → QA Smoke → Run workflow.

on:
  workflow_run:
    workflows: ["Build and Push"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to test (default: https://zorr.inglegames.com)'
        required: false
        default: 'https://zorr.inglegames.com'

permissions:
  contents: read
  issues: write

jobs:
  qa:
    runs-on: ubuntu-latest
    # Only run if the upstream build succeeded. (workflow_run fires on any
    # completion including failure/cancellation.)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install qa deps
        working-directory: qa
        run: npm install --no-audit --no-fund

      - name: Install Chromium for Playwright
        working-directory: qa
        run: npx playwright install --with-deps chromium

      # Dokploy's redeploy is async — webhook returns immediately, container
      # pulls the new image, restarts, and waits for the readiness probe.
      # 45 s is comfortable for the small zorr image. Bump if you ever see
      # the test catching the old container.
      - name: Wait for Dokploy to roll
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: sleep 45

      - name: Run smoke test
        id: smoke
        working-directory: qa
        env:
          QA_URL: ${{ github.event.inputs.url || 'https://zorr.inglegames.com' }}
          QA_READY_TIMEOUT_MS: '90000'
        run: node test.mjs

      # Auto-ping: only on scheduled (post-deploy) runs, not manual.
      # Manual runs from the Actions UI shouldn't spam issues.
      - name: Open issue on failure
        if: ${{ failure() && steps.smoke.conclusion == 'failure' && github.event_name == 'workflow_run' }}
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run?.head_sha || context.sha;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `QA smoke failed on ${sha.slice(0, 7)}`;
            const body = [
              `Post-deploy smoke test failed.`,
              ``,
              `- Commit: ${sha}`,
              `- Workflow run: ${runUrl}`,
              `- Triggered by: \`${context.payload.workflow_run?.name || 'Build and Push'}\``,
              ``,
              `Open the run, expand "Run smoke test" — the test output names`,
              `each failed check. Common causes:`,
              ``,
              `- WASM build broke an exported \`_qa_*\` symbol`,
              `- Dokploy didn't actually roll (old container still serving)`,
              `- A patch changed game-state shape and \`qa_dump_state\` JSON drifted`,
              ``,
              `Run locally to reproduce: \`cd qa && node test.mjs\`.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              assignees: [context.repo.owner],
              labels: ['qa-failure', 'auto-opened'],
            });
