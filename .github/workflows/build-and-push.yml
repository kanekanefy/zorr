name: Build and Push

# Trigger gating (2026-05-24):
#   - Skip docs-only pushes (markdown, docs/, license, gitignore).
#     Saves ~3 min of CI + a Dokploy redeploy that wouldn't change runtime.
#   - `[skip ci]` in commit message is also honored (GitHub-native).
#   - Manual override: always available via `workflow_dispatch` (Actions tab).
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE-NOTICE.md'
      - '.gitignore'
      - 'UPSTREAM_PIN.txt'
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trigger Dokploy redeploy after image is pushed to GHCR.
      # Uses the application-scoped refreshToken webhook (no API key required).
      # Token is per-app — rotate via Dokploy UI if leaked.
      # Skipped on tag pushes (only deploy on main-branch pushes).
      - name: Trigger Dokploy redeploy
        if: github.ref == 'refs/heads/main' && github.event_name != 'workflow_dispatch'
        run: |
          curl -sSf -X POST \
            "${{ secrets.DOKPLOY_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{}'
          echo
          echo "Dokploy redeploy triggered."
